<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Vedang</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

<div class="text-center">
  <h1 class="text-3xl mb-6 text-purple-400">Login to Continue</h1>

  <button onclick="googleLogin()"
    class="bg-white text-black px-6 py-2 rounded-lg hover:bg-gray-200">
    Sign in with Google
  </button>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .then((result) => {
      // Redirect after login
      window.location.href = "index.html";
    })
    .catch((error) => {
      console.error(error);
      alert("Login failed");
    });
}
</script>

</body>
</html>
<script>
firebase.auth().onAuthStateChanged((user) => {
  if (user) {
    window.location.href = "index.html";
  }
});
</script>
