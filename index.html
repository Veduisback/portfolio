<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedang | Portfolio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #1a0b2e, #020617);
    }
    .glow {
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.2);
    }
  </style>
</head>

<body class="text-white">

<!-- USER INFO -->
<div class="text-right p-3">
  <span id="userInfo" class="text-green-400 text-sm"></span>
  <button onclick="logout()" class="ml-4 text-red-400 text-sm">Logout</button>
</div>

<!-- HEADER -->
<header class="sticky top-0 bg-black/40 border-b border-purple-900">
  <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between">
    <h1 class="text-xl font-bold text-purple-400">Vedang</h1>
  </div>
</header>

<!-- CHATBOT -->
<section class="max-w-3xl mx-auto px-4 mt-10">
  <div class="bg-black/40 border border-purple-900 rounded-2xl glow overflow-hidden">

    <div class="p-3 border-b border-purple-900 flex justify-between text-sm">
      <span>Chat with my AI</span>
      <span class="text-green-400">Online</span>
    </div>

    <div id="chatBox" class="h-64 overflow-y-auto p-4 space-y-2">
      <p class="text-zinc-400 text-center">Ask anything 👇</p>
    </div>

    <div class="flex p-3 gap-2 border-t border-purple-900">
      <input id="userInput"
        class="flex-1 bg-black border border-purple-800 rounded-lg px-3 py-2"
        placeholder="Ask something..."
      >
      <button onclick="sendMessage()"
        class="bg-purple-600 px-4 py-2 rounded-lg">
        Send
      </button>
    </div>
  </div>
</section>

<!-- FIREBASE SCRIPT -->
<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

// 🔐 Protect page + show user
firebase.auth().onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById("userInfo").innerText =
      "Logged in as: " + user.displayName;
  }
});

// Logout
function logout() {
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  });
}

// Chat function
async function sendMessage() {
  const input = document.getElementById("userInput");
  const chatBox = document.getElementById("chatBox");

  const userText = input.value.trim();
  if (!userText) return;

  chatBox.innerHTML += `<div class="text-right text-purple-400">${userText}</div>`;
  input.value = "";

  try {
    const response = await fetch("https://portfolio-backend-x599.onrender.com/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message: userText }),
    });

    const data = await response.json();

    chatBox.innerHTML += `<div class="text-zinc-300">${data.reply}</div>`;
  } catch {
    chatBox.innerHTML += `<div class="text-red-400">Server sleeping... try again</div>`;
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
