<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedang | Portfolio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #1a0b2e, #020617);
    }
    .glow {
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.2);
    }
  </style>
</head>

<body class="text-white">

<!-- HEADER -->
<header class="sticky top-0 z-10 backdrop-blur-lg bg-black/40 border-b border-purple-900">
  <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
    <h1 class="text-xl font-bold text-purple-400">Vedang</h1>

    <div class="flex items-center gap-4 text-sm">
      <span id="userInfo" class="text-green-400"></span>
      <button onclick="logout()" class="text-red-400">Logout</button>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="py-24 text-center px-4">
  <h1 class="text-5xl sm:text-6xl font-bold mb-6">
    Hi, I'm <span class="text-purple-400">Vedang</span>
  </h1>

  <p class="text-zinc-400 max-w-xl mx-auto mb-8">
    CSE student building AI tools, full-stack apps, and scalable systems.
  </p>
</section>

<!-- CHATBOT -->
<section class="max-w-3xl mx-auto px-4 mb-16">
  <div class="bg-black/40 border border-purple-900 rounded-2xl glow overflow-hidden">

    <div class="p-3 border-b border-purple-900 text-sm flex justify-between">
      <span>Chat with my AI</span>
      <span class="text-green-400">Online</span>
    </div>

    <div id="chatBox" class="h-64 overflow-y-auto p-4 space-y-2">
      <p class="text-zinc-400 text-center">Ask anything about me 👇</p>
    </div>

    <div class="flex p-3 gap-2 border-t border-purple-900">
      <input id="userInput"
        class="flex-1 bg-black border border-purple-800 rounded-lg px-3 py-2 text-sm"
        placeholder="Ask about skills, projects..."
      >
      <button onclick="sendMessage()"
        class="bg-purple-600 px-4 py-2 rounded-lg">
        Send
      </button>
    </div>

  </div>
</section>

<!-- FIREBASE SCRIPT -->
<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

// Auth check + show user
firebase.auth().onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById("userInfo").innerText =
      user.displayName;
  }
});

function logout() {
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  });
}
</script>

<!-- CHATBOT -->
<script>
async function sendMessage() {
  const input = document.getElementById("userInput");
  const chatBox = document.getElementById("chatBox");

  const userText = input.value.trim();
  if (!userText) return;

  chatBox.innerHTML += `<div class="text-right text-purple-400">${userText}</div>`;
  input.value = "";

  try {
    const response = await fetch("https://portfolio-backend-x599.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ message: userText }),
    });

    const data = await response.json();
    chatBox.innerHTML += `<div class="text-zinc-300">${data.reply}</div>`;
  } catch {
    chatBox.innerHTML += `<div class="text-red-400">Server error</div>`;
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
